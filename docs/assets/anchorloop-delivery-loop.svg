<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 620" role="img" aria-labelledby="title description">
  <title id="title">AnchorLoop delivery loop</title>
  <desc id="description">A workflow from task through brief, plan, engineer approval, implementation, review, quality evidence, verification, and close. Failed verification moves through an explicit revision back to planning or implementation.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#10243a"/>
    </linearGradient>
    <linearGradient id="approval" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="evidence" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#047857"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#020617" flood-opacity=".35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7dd3fc"/>
    </marker>
    <marker id="revision-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24"/>
    </marker>
    <style>
      .label { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #f8fafc; }
      .title { font-family: Inter, Segoe UI, Arial, sans-serif; font-weight: 700; fill: #f8fafc; }
      .muted { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #bfdbfe; }
      .node { fill: #15253b; stroke: #335475; stroke-width: 1.5; }
      .node-title { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #f8fafc; }
      .node-detail { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 13px; fill: #cbd5e1; }
      .arrow-label { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 12px; font-weight: 700; fill: #bae6fd; letter-spacing: .04em; }
    </style>
  </defs>

  <rect width="1440" height="620" rx="28" fill="url(#background)"/>
  <text x="64" y="72" class="title" font-size="34">The delivery loop stays engineer-controlled</text>
  <text x="64" y="106" class="muted" font-size="18">Implementation begins only after an approved brief and plan. Failed verification takes an explicit route back.</text>

  <g fill="none" stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrow)">
    <path d="M202 265 H242"/>
    <path d="M377 265 H417"/>
    <path d="M552 265 H592"/>
    <path d="M757 265 H797"/>
    <path d="M932 265 H972"/>
    <path d="M1137 265 H1177"/>
    <path d="M1312 265 H1352"/>
  </g>
  <g class="arrow-label">
    <text x="212" y="234">RECORD</text>
    <text x="388" y="234">PLAN</text>
    <text x="565" y="234">APPROVE</text>
    <text x="764" y="234">BUILD</text>
    <text x="940" y="234">REVIEW</text>
    <text x="1141" y="234">VERIFY</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="64" y="200" width="138" height="130" rx="18" class="node"/>
    <circle cx="96" cy="232" r="14" fill="#38bdf8"/>
    <text x="120" y="238" class="node-title">Task</text>
    <text x="88" y="276" class="node-detail">Outcome and scope</text>
    <text x="88" y="298" class="node-detail">are explicit</text>

    <rect x="242" y="200" width="135" height="130" rx="18" class="node"/>
    <circle cx="274" cy="232" r="14" fill="#38bdf8"/>
    <text x="298" y="238" class="node-title">Brief</text>
    <text x="266" y="276" class="node-detail">Constraints +</text>
    <text x="266" y="298" class="node-detail">acceptance case</text>

    <rect x="417" y="200" width="135" height="130" rx="18" class="node"/>
    <circle cx="449" cy="232" r="14" fill="#38bdf8"/>
    <text x="473" y="238" class="node-title">Plan</text>
    <text x="441" y="276" class="node-detail">Concrete approach</text>
    <text x="441" y="298" class="node-detail">for review</text>

    <rect x="592" y="188" width="165" height="154" rx="18" fill="url(#approval)" stroke="#60a5fa" stroke-width="2"/>
    <circle cx="624" cy="224" r="14" fill="#dbeafe"/>
    <text x="648" y="230" class="node-title">Engineer approval</text>
    <text x="616" y="270" class="node-detail">Pins brief, plan</text>
    <text x="616" y="292" class="node-detail">and ruleset</text>
    <text x="616" y="316" class="node-detail">before execution</text>

    <rect x="797" y="200" width="135" height="130" rx="18" class="node"/>
    <circle cx="829" cy="232" r="14" fill="#38bdf8"/>
    <text x="853" y="238" class="node-title">Implement</text>
    <text x="821" y="276" class="node-detail">Agent writes the</text>
    <text x="821" y="298" class="node-detail">approved change</text>

    <rect x="972" y="188" width="165" height="154" rx="18" fill="url(#evidence)" stroke="#6ee7b7" stroke-width="2"/>
    <circle cx="1004" cy="224" r="14" fill="#d1fae5"/>
    <text x="1028" y="230" class="node-title">Review + precommit</text>
    <text x="996" y="270" class="node-detail">Checks + workspace</text>
    <text x="996" y="292" class="node-detail">fingerprint become</text>
    <text x="996" y="316" class="node-detail">recorded evidence</text>

    <rect x="1177" y="200" width="135" height="130" rx="18" class="node"/>
    <circle cx="1209" cy="232" r="14" fill="#fbbf24"/>
    <text x="1233" y="238" class="node-title">Verify</text>
    <text x="1201" y="276" class="node-detail">Engineer records</text>
    <text x="1201" y="298" class="node-detail">observed result</text>

    <rect x="1352" y="200" width="56" height="130" rx="18" fill="#0f766e" stroke="#5eead4" stroke-width="2"/>
    <path d="M1371 263 l10 10 19 -23" fill="none" stroke="#ccfbf1" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1362" y="304" class="node-detail" font-size="11">Close</text>
  </g>

  <g fill="none" stroke="#fbbf24" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#revision-arrow)">
    <path d="M1244 330 V420 H742 V355"/>
    <path d="M742 420 H484 V355"/>
  </g>
  <rect x="816" y="392" width="240" height="56" rx="28" fill="#3a2d13" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="850" y="426" class="label" font-size="16" font-weight="700">Verification fails → revise</text>
  <text x="568" y="462" class="muted" font-size="14">Return to implementation when scope holds; return to planning when it changed.</text>

  <text x="64" y="564" class="muted" font-size="15">AnchorLoop records the loop; it does not claim to authenticate the person providing an approval.</text>
</svg>
