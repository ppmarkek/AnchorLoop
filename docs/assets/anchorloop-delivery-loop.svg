<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 448" role="img" aria-labelledby="title description">
  <title id="title">AnchorLoop delivery loop</title>
  <desc id="description">The ordered AnchorLoop workflow moves from task, brief, and plan through engineer approval, implementation, review and precommit, verification, and close. A failed verification remains recorded and returns explicitly to implementation when scope is unchanged, or to planning and approval when the scope or approach changes.</desc>
  <defs>
    <marker id="forward-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 10 5 0 10Z" class="forward-head"/>
    </marker>
    <marker id="revision-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 10 5 0 10Z" class="revision-head"/>
    </marker>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --ink: #1f2328;
        --muted: #57606a;
        --rail: #afb8c1;
        --rail-strong: #57606a;
        --blue: #0969da;
        --green: #1a7f37;
        --amber: #9a6700;
        --on-accent: #ffffff;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d1117;
          --ink: #f0f6fc;
          --muted: #8b949e;
          --rail: #30363d;
          --rail-strong: #8b949e;
          --blue: #58a6ff;
          --green: #3fb950;
          --amber: #d29922;
          --on-accent: #0d1117;
        }
      }
      .canvas { fill: var(--bg); }
      .ui { font-family: Inter, "Segoe UI", Arial, sans-serif; }
      .step { font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; font-size: 14px; font-weight: 700; fill: var(--muted); }
      .stage { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 22px; font-weight: 700; fill: var(--ink); }
      .meta { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 16px; fill: var(--muted); }
      .route-label { font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; font-size: 14px; font-weight: 700; fill: var(--amber); letter-spacing: .02em; }
      .route-target { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 17px; font-weight: 700; fill: var(--ink); }
      .failure-note { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 16px; fill: var(--amber); }
      .forward { fill: none; stroke: var(--rail-strong); stroke-width: 2; stroke-linecap: round; vector-effect: non-scaling-stroke; marker-end: url(#forward-arrow); }
      .revision { fill: none; stroke: var(--amber); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 5 6; vector-effect: non-scaling-stroke; marker-end: url(#revision-arrow); }
      .forward-head { fill: var(--rail-strong); }
      .revision-head { fill: var(--amber); }
      .neutral-node { fill: var(--bg); stroke: var(--rail-strong); stroke-width: 2; vector-effect: non-scaling-stroke; }
      .action-node { fill: var(--bg); stroke: var(--ink); stroke-width: 2; vector-effect: non-scaling-stroke; }
      .approval-node { fill: var(--blue); }
      .evidence-node { fill: var(--bg); stroke: var(--green); stroke-width: 2.5; vector-effect: non-scaling-stroke; }
      .verify-node { fill: var(--amber); }
      .close-node { fill: var(--blue); }
      .on-accent { fill: var(--on-accent); stroke: var(--on-accent); }
      .blue { fill: var(--blue); }
      .green { fill: var(--green); }
      .amber { fill: var(--amber); }
    </style>
  </defs>

  <rect width="1120" height="448" class="canvas"/>

  <g aria-hidden="true">
    <path class="forward" d="M108 124H389"/>
    <path class="forward" d="M417 124H698"/>
    <path class="forward" d="M727 124H1005"/>
    <path class="forward" d="M1024 143V273"/>
    <path class="forward" d="M1012 292H731"/>
    <path class="forward" d="M699 292H423"/>
    <path class="forward" d="M391 292H113"/>
  </g>

  <g text-anchor="middle">
    <text x="96" y="36" class="step">01</text>
    <text x="96" y="64" class="stage">Task</text>
    <text x="96" y="90" class="meta">Outcome + scope</text>

    <text x="405" y="36" class="step">02</text>
    <text x="405" y="64" class="stage">Brief</text>
    <text x="405" y="90" class="meta">Constraints + acceptance</text>

    <text x="714" y="36" class="step">03</text>
    <text x="714" y="64" class="stage">Plan</text>
    <text x="714" y="90" class="meta">Approach + verification</text>

    <text x="1024" y="36" class="step blue">04</text>
    <text x="1024" y="64" class="stage">Approval</text>
    <text x="1024" y="90" class="meta">Engineer gate</text>

    <text x="994" y="204" text-anchor="end" class="step">05</text>
    <text x="994" y="232" text-anchor="end" class="stage">Implement</text>
    <text x="994" y="258" text-anchor="end" class="meta">Approved change</text>

    <text x="714" y="204" class="step green">06</text>
    <text x="714" y="232" class="stage">Review, then precommit</text>
    <text x="714" y="258" class="meta">Checks + fingerprint</text>

    <text x="405" y="204" class="step amber">07</text>
    <text x="405" y="232" class="stage">Verify</text>
    <text x="405" y="258" class="meta">Observed result</text>

    <text x="96" y="204" class="step blue">08</text>
    <text x="96" y="232" class="stage">Close</text>
    <text x="96" y="258" class="meta">Evidence still matches</text>
  </g>

  <g aria-hidden="true">
    <circle cx="96" cy="124" r="7" class="neutral-node"/>
    <circle cx="405" cy="124" r="7" class="neutral-node"/>
    <circle cx="714" cy="124" r="7" class="neutral-node"/>

    <rect x="1015" y="115" width="18" height="18" rx="2" class="approval-node" transform="rotate(45 1024 124)"/>
    <circle cx="1024" cy="124" r="3.5" class="canvas"/>

    <rect x="1015" y="283" width="18" height="18" rx="3" class="action-node"/>
    <circle cx="714" cy="292" r="11" class="evidence-node"/>
    <circle cx="714" cy="292" r="3.5" class="green"/>

    <rect x="396" y="283" width="18" height="18" rx="2" class="verify-node" transform="rotate(45 405 292)"/>
    <circle cx="405" cy="292" r="3.5" class="canvas"/>

    <circle cx="96" cy="292" r="14" class="close-node"/>
    <path d="M89 292l5 5 10-12" fill="none" class="on-accent" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g>
    <path class="revision" d="M405 307V362H1024V309"/>
    <path class="revision" d="M405 362V414H696"/>
    <text x="430" y="326" class="failure-note">Failed result remains recorded</text>
    <text x="430" y="350" class="route-label">SAME SCOPE</text>
    <text x="992" y="350" text-anchor="end" class="route-target">05 Implement</text>
    <text x="430" y="402" class="route-label">SCOPE OR APPROACH CHANGED</text>
    <text x="720" y="402" class="route-target">03 Plan &#8594; 04 Approval</text>
  </g>
</svg>
