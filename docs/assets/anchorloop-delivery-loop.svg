<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title description">
  <title id="title">AnchorLoop delivery loop</title>
  <desc id="description">A numbered workflow from task through brief, plan, engineer approval, implementation, review and precommit, verification, and close. A failed verification remains recorded and returns explicitly to implementation or to planning and approval.</desc>
  <defs>
    <marker id="flow-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 10 5 0 10Z" fill="#7dd3fc"/>
    </marker>
    <marker id="revision-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 10 5 0 10Z" fill="#fbbf24"/>
    </marker>
    <style>
      .ui { font-family: Inter, "Segoe UI", Arial, sans-serif; }
      .heading { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #f8fafc; }
      .subtitle { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 17px; fill: #b9c8dc; }
      .card { fill: #111c2f; stroke: #ffffff; stroke-opacity: .11; stroke-width: 1.5; }
      .card-title { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #f8fafc; }
      .card-body { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 16px; fill: #cbd5e1; }
      .step { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 13px; font-weight: 800; fill: #dbeafe; letter-spacing: .04em; }
      .eyebrow { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 13px; font-weight: 800; letter-spacing: .08em; }
      .footer { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 14.5px; fill: #9fb0c6; }
      .flow { fill: none; stroke: #7dd3fc; stroke-width: 2.5; stroke-linecap: round; marker-end: url(#flow-arrow); }
    </style>
  </defs>

  <rect x=".75" y=".75" width="1198.5" height="718.5" rx="24" fill="#0b1220" stroke="#ffffff" stroke-opacity=".1" stroke-width="1.5"/>

  <text x="48" y="58" class="heading">Delivery stays engineer-controlled</text>
  <text x="48" y="89" class="subtitle">Implementation starts only after approval. Every later gate records evidence before work can close.</text>
  <line x1="48" y1="116" x2="1152" y2="116" stroke="#ffffff" stroke-opacity=".1"/>

  <g aria-hidden="true">
    <path class="flow" d="M288 208H328"/>
    <path class="flow" d="M576 208H616"/>
    <path class="flow" d="M864 208H904"/>
    <path class="flow" d="M1032 272V336"/>
    <path class="flow" d="M912 408H872"/>
    <path class="flow" d="M624 408H584"/>
    <path class="flow" d="M336 408H296"/>
    <text x="1052" y="311" class="eyebrow" fill="#bae6fd">APPROVED</text>
  </g>

  <g>
    <rect x="48" y="144" width="240" height="128" rx="16" class="card"/>
    <rect x="68" y="164" width="36" height="24" rx="12" fill="#16344b"/>
    <text x="78" y="181" class="step">01</text>
    <text x="116" y="183" class="card-title">Task</text>
    <text x="72" y="222" class="card-body">Outcome and scope</text>
    <text x="72" y="247" class="card-body">set by the engineer</text>

    <rect x="336" y="144" width="240" height="128" rx="16" class="card"/>
    <rect x="356" y="164" width="36" height="24" rx="12" fill="#16344b"/>
    <text x="366" y="181" class="step">02</text>
    <text x="404" y="183" class="card-title">Brief</text>
    <text x="360" y="222" class="card-body">Constraints and</text>
    <text x="360" y="247" class="card-body">acceptance case</text>

    <rect x="624" y="144" width="240" height="128" rx="16" class="card"/>
    <rect x="644" y="164" width="36" height="24" rx="12" fill="#16344b"/>
    <text x="654" y="181" class="step">03</text>
    <text x="692" y="183" class="card-title">Plan</text>
    <text x="648" y="222" class="card-body">Approach, trade-off,</text>
    <text x="648" y="247" class="card-body">and verification</text>

    <rect x="912" y="144" width="240" height="128" rx="16" fill="#172a4f" stroke="#60a5fa" stroke-opacity=".8" stroke-width="1.5"/>
    <rect x="932" y="164" width="36" height="24" rx="12" fill="#2563eb"/>
    <text x="942" y="181" class="step">04</text>
    <text x="980" y="183" class="card-title">Engineer approval</text>
    <text x="936" y="222" class="card-body">Pins brief, plan,</text>
    <text x="936" y="247" class="card-body">and ruleset</text>

    <rect x="912" y="344" width="240" height="128" rx="16" class="card"/>
    <rect x="932" y="364" width="36" height="24" rx="12" fill="#16344b"/>
    <text x="942" y="381" class="step">05</text>
    <text x="980" y="383" class="card-title">Implement</text>
    <text x="936" y="422" class="card-body">Agent writes the</text>
    <text x="936" y="447" class="card-body">approved change</text>

    <rect x="624" y="344" width="240" height="128" rx="16" fill="#12352f" stroke="#34d399" stroke-opacity=".8" stroke-width="1.5"/>
    <rect x="644" y="364" width="36" height="24" rx="12" fill="#047857"/>
    <text x="654" y="381" class="step">06</text>
    <text x="692" y="383" class="card-title">Review + precommit</text>
    <text x="648" y="422" class="card-body">Checks and fingerprint</text>
    <text x="648" y="447" class="card-body">become evidence</text>

    <rect x="336" y="344" width="240" height="128" rx="16" fill="#2b2515" stroke="#fbbf24" stroke-opacity=".75" stroke-width="1.5"/>
    <rect x="356" y="364" width="36" height="24" rx="12" fill="#a16207"/>
    <text x="366" y="381" class="step">07</text>
    <text x="404" y="383" class="card-title">Verify</text>
    <text x="360" y="422" class="card-body">Engineer records the</text>
    <text x="360" y="447" class="card-body">observed result</text>

    <rect x="48" y="344" width="240" height="128" rx="16" fill="#12323a" stroke="#2dd4bf" stroke-opacity=".75" stroke-width="1.5"/>
    <rect x="68" y="364" width="36" height="24" rx="12" fill="#0f766e"/>
    <text x="78" y="381" class="step">08</text>
    <text x="116" y="383" class="card-title">Close</text>
    <text x="72" y="422" class="card-body">Evidence still matches;</text>
    <text x="72" y="447" class="card-body">the task can close</text>
  </g>

  <path d="M456 472V504" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" marker-end="url(#revision-arrow)"/>
  <rect x="48" y="520" width="1104" height="116" rx="16" fill="#241e11" stroke="#fbbf24" stroke-opacity=".55" stroke-width="1.5"/>
  <circle cx="80" cy="552" r="16" fill="#f59e0b"/>
  <text x="77" y="558" class="ui" font-size="18" font-weight="800" fill="#1c1917">!</text>
  <text x="108" y="558" class="ui" font-size="19" font-weight="700" fill="#fef3c7">Verification fails</text>
  <text x="108" y="588" class="ui" font-size="15.5" fill="#d6c9aa">The failed result stays recorded.</text>
  <line x1="398" y1="540" x2="398" y2="616" stroke="#fbbf24" stroke-opacity=".24"/>
  <text x="430" y="554" class="eyebrow" fill="#fcd34d">SAME SCOPE</text>
  <text x="430" y="584" class="ui" font-size="17" font-weight="700" fill="#f8fafc">Return to implementation</text>
  <text x="748" y="554" class="eyebrow" fill="#fcd34d">SCOPE OR SOLUTION CHANGED</text>
  <text x="748" y="584" class="ui" font-size="17" font-weight="700" fill="#f8fafc">Revise plan, then re-approve</text>

  <text x="48" y="684" class="footer">AnchorLoop records workflow evidence; it does not authenticate the person providing approval.</text>
</svg>
