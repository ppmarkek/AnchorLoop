<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 400" role="img" aria-labelledby="title description">
  <title id="title">AnchorLoop evidence integrity</title>
  <desc id="description">The engineer-approved subject, including brief, plan, human ownership evidence, and active rules, creates an approval record. Precommit checks and a materialized workspace fingerprint create quality evidence. Verification and close are separate ordered gates and require both records to remain current. A changed approved subject requires revision and re-approval; a changed checked workspace requires review and precommit again.</desc>
  <defs>
    <marker id="flow-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 10 5 0 10Z" class="flow-head"/>
    </marker>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --ink: #1f2328;
        --muted: #57606a;
        --rail: #afb8c1;
        --rail-strong: #57606a;
        --blue: #0969da;
        --green: #1a7f37;
        --red: #cf222e;
        --on-accent: #ffffff;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d1117;
          --ink: #f0f6fc;
          --muted: #8b949e;
          --rail: #30363d;
          --rail-strong: #8b949e;
          --blue: #58a6ff;
          --green: #3fb950;
          --red: #f85149;
          --on-accent: #0d1117;
        }
      }
      .canvas { fill: var(--bg); }
      .ui { font-family: Inter, "Segoe UI", Arial, sans-serif; }
      .source { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 22px; font-weight: 700; fill: var(--ink); }
      .record { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 22px; font-weight: 700; fill: var(--ink); }
      .gate { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 18px; font-weight: 700; fill: var(--ink); }
      .meta { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 16px; fill: var(--muted); }
      .invalidation { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 15px; font-weight: 700; fill: var(--red); }
      .wire { fill: none; stroke: var(--rail-strong); stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; }
      .flow { fill: none; stroke: var(--rail-strong); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; marker-end: url(#flow-arrow); }
      .flow-head { fill: var(--rail-strong); }
      .approval-node { fill: var(--blue); }
      .quality-node { fill: var(--green); }
      .verify-node { fill: var(--bg); stroke: var(--blue); stroke-width: 2.5; vector-effect: non-scaling-stroke; }
      .close-node { fill: var(--blue); }
      .on-accent { fill: var(--on-accent); stroke: var(--on-accent); }
      .invalidation-line { fill: none; stroke: var(--red); stroke-width: 1.5; stroke-dasharray: 4 5; stroke-linecap: round; vector-effect: non-scaling-stroke; }
      .red-dot { fill: var(--red); }
    </style>
  </defs>

  <rect width="1120" height="400" class="canvas"/>

  <g>
    <text x="48" y="94" class="source">Approved subject</text>
    <text x="48" y="121" class="meta">brief &#183; plan &#183; ownership &#183; rules</text>

    <text x="48" y="269" class="source">Checked workspace</text>
    <text x="48" y="296" class="meta">precommit checks + fingerprint</text>
  </g>

  <g aria-hidden="true">
    <path class="flow" d="M310 100H410"/>
    <path class="flow" d="M310 275H650"/>

    <path class="wire" d="M448 100H900V188"/>
    <path class="wire" d="M688 275H900V188"/>
    <circle cx="900" cy="188" r="4" fill="var(--rail-strong)"/>
    <path class="flow" d="M904 188H970"/>
    <path class="flow" d="M1006 188H1040"/>
  </g>

  <g aria-hidden="true">
    <rect x="421" y="91" width="18" height="18" rx="2" class="approval-node" transform="rotate(45 430 100)"/>
    <circle cx="430" cy="100" r="3.5" class="canvas"/>

    <rect x="661" y="266" width="18" height="18" rx="2" class="quality-node" transform="rotate(45 670 275)"/>
    <circle cx="670" cy="275" r="3.5" class="canvas"/>

    <circle cx="990" cy="188" r="13" class="verify-node"/>
    <circle cx="990" cy="188" r="3.5" fill="var(--blue)"/>

    <circle cx="1060" cy="188" r="15" class="close-node"/>
    <path d="M1053 188l5 5 10-12" fill="none" class="on-accent" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g text-anchor="middle">
    <text x="430" y="42" class="record">Approval record</text>
    <text x="430" y="68" class="meta">engineer-approved subject</text>

    <text x="670" y="222" class="record">Quality evidence</text>
    <text x="670" y="248" class="meta">checks + SHA-256 fingerprint</text>

    <text x="990" y="232" class="gate">Verify</text>
    <text x="1060" y="232" class="gate">Close</text>
    <text x="1025" y="258" class="meta">both records current</text>
  </g>

  <g>
    <path class="invalidation-line" d="M430 114V164H454"/>
    <circle cx="462" cy="164" r="4" class="red-dot"/>
    <text x="476" y="159" class="invalidation">Approved subject changed</text>
    <text x="476" y="183" class="meta">archive &#8594; revise &#8594; re-approve</text>

    <path class="invalidation-line" d="M670 289V360H694"/>
    <circle cx="702" cy="360" r="4" class="red-dot"/>
    <text x="716" y="355" class="invalidation">Checked workspace changed</text>
    <text x="716" y="379" class="meta">review + precommit again</text>
  </g>
</svg>
